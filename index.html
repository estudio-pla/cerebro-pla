<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIOS PLÁ — v2.0.0</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23111'/><text y='.9em' font-size='80' x='10'>🧠</text></svg>">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;color:#e0e0e0;font-family:'Courier New',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}

  /* LOGIN */
  #loginScreen{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:20px}
  #loginScreen h1{font-size:28px;letter-spacing:.2em;color:#39ff14;text-shadow:0 0 20px #39ff14}
  #loginScreen input{background:#111;border:1px solid #333;color:#e0e0e0;padding:12px 20px;font-size:18px;font-family:monospace;border-radius:8px;width:260px;text-align:center}
  #loginScreen input:focus{outline:none;border-color:#39ff14}
  #loginErr{color:#ff4444;font-size:14px;min-height:20px}
  #loginScreen button{background:#39ff14;color:#000;border:none;padding:12px 40px;font-size:16px;font-weight:700;border-radius:8px;cursor:pointer;letter-spacing:.1em}

  /* MAIN */
  #mainApp{display:none;flex-direction:column;align-items:center;width:100vw;height:100vh;padding:20px}
  #header{font-size:13px;color:#555;letter-spacing:.15em;margin-bottom:16px}

  /* GONIÔMETRO */
  #gonioWrap{position:relative;width:280px;height:280px;margin:0 auto 20px}
  #gonioCanvas{width:280px;height:280px;border-radius:50%}
  #gonioLabel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:#39ff14;letter-spacing:.1em;text-align:center;line-height:1.8;pointer-events:none}

  /* STATUS */
  #status{font-size:14px;color:#555;letter-spacing:.08em;min-height:22px;text-align:center;margin-bottom:16px}

  /* OUTPUT */
  #outBox{background:#111;border:1px solid #222;border-radius:10px;width:100%;max-width:700px;max-height:220px;overflow-y:auto;padding:16px;font-size:15px;line-height:1.7;color:#ccc;flex:1}
  #outBox.falando{border-color:#39ff14;box-shadow:0 0 12px rgba(57,255,20,.15)}

  /* HINT */
  #hint{margin-top:12px;font-size:11px;color:#333;letter-spacing:.06em}

  /* COPIAR */
  #btnCopiar{display:none;margin-top:10px;padding:7px 18px;background:#1a1a1a;border:1px solid #333;color:#aaa;border-radius:6px;cursor:pointer;font-size:13px}
  #btnCopiar:hover{border-color:#39ff14;color:#39ff14}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>BIOS PLÁ</h1>
  <div style="color:#444;font-size:12px;letter-spacing:.1em">ESTÚDIO PLÁ · ACESSO RESTRITO</div>
  <input id="loginUser" type="text" placeholder="usuário" autocomplete="off">
  <input id="loginPass" type="password" placeholder="senha" autocomplete="off">
  <input id="loginKey" type="password" placeholder="Gemini API Key" autocomplete="off" onkeydown="if(event.key==='Enter')entrar()" style="font-size:14px;letter-spacing:.05em">
  <div id="loginErr"></div>
  <button onclick="entrar()">ENTRAR</button>
</div>

<!-- MAIN -->
<div id="mainApp">
  <div id="header">BIOS PLÁ v2.0.0 · ESTÚDIO PLÁ · Kaue Ferreira Moraes</div>

  <div id="gonioWrap">
    <canvas id="gonioCanvas" width="280" height="280"></canvas>
    <div id="gonioLabel">BIOS PLÁ<br><span id="gonioMode" style="font-size:11px;color:#555">AGUARDANDO</span></div>
  </div>

  <div id="status">Segure ESPAÇO para falar</div>
  <div id="outBox">Aguardando Kaue...</div>
  <button id="btnCopiar" onclick="copiar()">📋 Copiar</button>
  <div id="hint">ESPAÇO · segurar = falar · soltar = enviar</div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
let GEMINI_KEY = '';
const GH_TOKEN   = '';
const GH_REPO    = 'estudio-pla/bios-pla';

// ══════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════
function entrar() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value.trim();
  const k = document.getElementById('loginKey').value.trim();
  if (u === 'euakox' && p === '364520') {
    if (!k) { document.getElementById('loginErr').textContent = 'Insira a chave Gemini.'; return; }
    GEMINI_KEY = k;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'flex';
    iniciar();
  } else {
    document.getElementById('loginErr').textContent = 'Acesso negado.';
    setTimeout(()=>document.getElementById('loginErr').textContent='', 2000);
  }
}

// ══════════════════════════════════════════════
// VOZ MASCULINA
// ══════════════════════════════════════════════
let vozMasc = null;
function carregarVoz() {
  const vozes = speechSynthesis.getVoices();
  // Prioriza: masculina + português BR
  vozMasc = vozes.find(v => v.lang === 'pt-BR' && v.name.toLowerCase().includes('masculin'))
         || vozes.find(v => v.lang === 'pt-BR' && !v.name.toLowerCase().includes('female'))
         || vozes.find(v => v.lang.startsWith('pt'))
         || vozes[0];
}
speechSynthesis.onvoiceschanged = carregarVoz;

function falar(texto, cb) {
  carregarVoz();
  const u = new SpeechSynthesisUtterance(texto);
  u.voice = vozMasc;
  u.lang  = 'pt-BR';
  u.pitch = 0.7;
  u.rate  = 1.05;
  if (cb) u.onend = cb;
  speechSynthesis.speak(u);
}

// ══════════════════════════════════════════════
// GONIÔMETRO
// ══════════════════════════════════════════════
const canvas = document.getElementById('gonioCanvas');
const ctx    = canvas.getContext('2d');
let nivel = 0, alvo = 0, animId;

function desenharGonio() {
  const W = 280, H = 280, cx = 140, cy = 140, r = 120;
  ctx.clearRect(0, 0, W, H);

  // Fundo
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = '#0f0f0f';
  ctx.fill();

  // Arcos de nível
  const cores = ['#1a3a1a','#1e4d1e','#22661e','#39ff14'];
  for (let i = 0; i < 4; i++) {
    const pct = Math.min(nivel / (i+1===4?1:.75), 1);
    if (nivel > i*.25) {
      ctx.beginPath();
      ctx.arc(cx, cy, r - 10 - i*18, -Math.PI/2, -Math.PI/2 + Math.PI*2*Math.min((nivel-.25*i)/.25,1));
      ctx.strokeStyle = cores[i];
      ctx.lineWidth = 14;
      ctx.stroke();
    }
  }

  // Círculo central pulsante
  const pulse = .7 + nivel*.5;
  ctx.beginPath();
  ctx.arc(cx, cy, 18*pulse, 0, Math.PI*2);
  ctx.fillStyle = nivel > .1 ? `rgba(57,255,20,${.3+nivel*.7})` : '#1a1a1a';
  ctx.fill();

  nivel += (alvo - nivel) * .12;
  animId = requestAnimationFrame(desenharGonio);
}

// ══════════════════════════════════════════════
// MIC + STT
// ══════════════════════════════════════════════
let recognition = null, micAtivo = false, textoCapturado = '';

function initRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'pt-BR'; r.continuous = true; r.interimResults = false;
  r.onresult = ev => {
    textoCapturado += Array.from(ev.results).slice(ev.resultIndex)
      .filter(x=>x.isFinal).map(x=>x[0].transcript).join(' ');
  };
  r.onerror = () => { micAtivo = false; alvo = 0; setStatus('Erro no microfone'); };
  r.onend   = () => { if (micAtivo) try{r.start()}catch(e){} };
  return r;
}

// ══════════════════════════════════════════════
// BIOS / GITHUB
// ══════════════════════════════════════════════
let reptiliano = [], amigdala = [];

async function ghGet(path) {
  const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`,
    {headers:{'Authorization':`Bearer ${GH_TOKEN}`,'Accept':'application/vnd.github.v3+json'}});
  if (!res.ok) return null;
  const d = await res.json();
  return JSON.parse(decodeURIComponent(escape(atob(d.content))));
}

async function ghSalvar(texto, pergunta) {
  if (!GH_TOKEN) return;
  const ts = new Date().toLocaleString('pt-BR');
  const linha = `\n---\n[${ts}]\nKaue: ${pergunta}\nBIOS: ${texto}\n`;
  const path = 'registros/sessao-ativa.txt';
  const url  = `https://api.github.com/repos/${GH_REPO}/contents/${path}`;
  const headers = {'Authorization':`Bearer ${GH_TOKEN}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  let sha='', atual='';
  try {
    const r = await fetch(url,{headers});
    if (r.ok){const d=await r.json();sha=d.sha;atual=atob(d.content.replace(/\n/g,''));}
  } catch(e){}
  const novo = atual + linha;
  await fetch(url,{method:'PUT',headers,body:JSON.stringify({message:`sessao: ${ts}`,content:btoa(unescape(encodeURIComponent(novo))),sha:sha||undefined})});
}

async function balancoDia() {
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/registros/sessao-ativa.txt`,
      {headers:{'Authorization':`Bearer ${GH_TOKEN}`}});
    if (!res.ok) return 'Sem registros de hoje ainda.';
    const d = await res.json();
    const txt = atob(d.content.replace(/\n/g,''));
    const linhas = txt.split('\n').filter(Boolean);
    const qtd = linhas.filter(l=>l.startsWith('[') || l.startsWith('Kaue:')).length;
    return `Hoje tivemos ${Math.floor(qtd/2)} interações registradas.`;
  } catch(e){ return ''; }
}

// ══════════════════════════════════════════════
// GEMINI
// ══════════════════════════════════════════════
function buildPrompt() {
  const L1 = reptiliano.map(r=>`• [${r.id}] ${r.titulo}: ${r.via_maquina}`).join('\n') || '(não conectado)';
  const Le = amigdala.filter(e=>e.prioridade==='estrutural').map(e=>`• ${e.titulo}: ${e.regra_derivada||e.conteudo}`).join('\n')||'(nenhuma)';
  const Lp = amigdala.filter(e=>e.prioridade!=='estrutural').map(e=>`• ${e.titulo}: ${e.conteudo}`).join('\n')||'(nenhuma)';
  return `Você é o BIOS PLÁ, assistente do Estúdio Plá de Kaue Ferreira Moraes (Bauru SP).\nResponda em português, texto limpo, sem asteriscos, hashtags ou markdown.\nSeja direto e técnico.\n\nL1 REPTILIANO:\n${L1}\nL2 ESTRUTURAL:\n${Le}\nL2 PONTUAL:\n${Lp}`;
}

async function enviarGemini(texto) {
  // Descobre modelo ativo
  const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${GEMINI_KEY}`);
  const listData = await listRes.json();
  if (!listRes.ok) throw new Error(listData.error?.message || 'Chave inválida');
  const modelos = listData.models.filter(m =>
    m.supportedGenerationMethods?.includes('generateContent') && m.name.includes('gemini')
  );
  if (!modelos.length) throw new Error('Nenhum modelo disponível');
  const modelo = modelos[0].name;

  // Monta prompt com sistema embutido no texto
  const promptFull = buildPrompt() + '\n\nTAREFA DO USUÁRIO:\n' + texto;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/${modelo}:generateContent?key=${GEMINI_KEY}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({contents:[{parts:[{text:promptFull}]}]})});
  if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||'Erro Gemini'); }
  const d = await res.json();
  let r = d.candidates?.[0]?.content?.parts?.[0]?.text || '';
  r = r.replace(/#{1,6}\s*/g,'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/^[-*]\s+/gm,'').trim();
  return r;
}

// ══════════════════════════════════════════════
// FLUXO PRINCIPAL
// ══════════════════════════════════════════════
function setStatus(t) { document.getElementById('status').textContent = t; }
function setMode(t)   { document.getElementById('gonioMode').textContent = t; }

async function processar() {
  if (!textoCapturado.trim()) { setStatus('Não ouvi nada. Tente novamente.'); return; }
  const pergunta = textoCapturado.trim();
  textoCapturado = '';

  const out = document.getElementById('outBox');
  out.classList.remove('falando');
  out.textContent = 'Processando...';
  document.getElementById('btnCopiar').style.display = 'none';

  setStatus('Ok Kaue, processando...');
  setMode('PROCESSANDO');
  alvo = .4;
  falar('Ok Cauê, processando seu pedido');

  try {
    // Balanço rápido enquanto processa
    const bal = await balancoDia();

    const resposta = await enviarGemini(pergunta);

    // Salva
    ghSalvar(resposta, pergunta);

    // Exibe
    out.textContent = resposta;
    out.classList.add('falando');
    document.getElementById('btnCopiar').style.display = 'inline-block';

    // Fala balanço + resposta
    alvo = .9;
    setMode('FALANDO');
    const textoVoz = (bal ? bal + '. ' : '') + resposta;
    falar(textoVoz, () => { alvo = 0; setMode('AGUARDANDO'); out.classList.remove('falando'); });

    setStatus('Segure ESPAÇO para nova mensagem');
  } catch(e) {
    out.textContent = 'ERRO: ' + e.message;
    setStatus('Erro — tente novamente');
    alvo = 0;
  }
}

function copiar() {
  const txt = document.getElementById('outBox').textContent;
  navigator.clipboard.writeText(txt);
  document.getElementById('btnCopiar').textContent = '✓ Copiado';
  setTimeout(()=>document.getElementById('btnCopiar').textContent='📋 Copiar',2000);
}

// ══════════════════════════════════════════════
// ESPAÇO PTT
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.code==='Space' && !e.repeat) {
    const tag = document.activeElement.tagName;
    if (tag==='INPUT'||tag==='TEXTAREA') return;
    e.preventDefault();
    if (!micAtivo) {
      if (!recognition) recognition = initRec();
      if (!recognition) return;
      micAtivo = true; textoCapturado = '';
      try { recognition.start(); } catch(err){}
      alvo = .6; setStatus('Ouvindo Kaue...'); setMode('OUVINDO');
    }
  }
});

document.addEventListener('keyup', e => {
  if (e.code==='Space') {
    if (!micAtivo) return;
    e.preventDefault();
    micAtivo = false;
    if (recognition) recognition.stop();
    alvo = .2; setStatus('Enviando...'); setMode('ENVIANDO');
    setTimeout(processar, 700);
  }
});

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function iniciar() {
  desenharGonio();
  carregarVoz();

  // Carrega memória
  try {
    const rep = await ghGet('reptiliano.json');
    if (rep) reptiliano = rep.regras || [];
    const ami = await ghGet('amigdala.json');
    if (ami) amigdala = ami.entradas || [];
  } catch(e){}

  setStatus('Preparando...');
  await new Promise(r=>setTimeout(r,800));

  // Boas-vindas
  alvo = .5;
  falar('Olá, bem-vindo Cauê. Tudo bem? No que posso ajudar?', ()=>{ alvo=0; });
  setStatus('Segure ESPAÇO para falar');
  setMode('AGUARDANDO');
}
</script>
</body>
</html>
